<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="500">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="500" rx="16" fill="url(#bg)"/>
  <rect x="1" y="1" width="798" height="498" rx="15" stroke="url(#accent)" stroke-opacity="0.3" stroke-width="1" fill="none"/>
  
  <!-- Title bar -->
  <rect y="0" width="800" height="44" rx="16" fill="#1e293b"/>
  <rect y="28" width="800" height="16" fill="#1e293b"/>
  <circle cx="24" cy="22" r="6" fill="#ef4444" opacity="0.8"/>
  <circle cx="44" cy="22" r="6" fill="#eab308" opacity="0.8"/>
  <circle cx="64" cy="22" r="6" fill="#22c55e" opacity="0.8"/>
  <text x="400" y="27" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="12">xyvaClaw Setup Wizard — http://localhost:19090</text>
  
  <!-- Step indicator -->
  <g transform="translate(100, 80)">
    <circle cx="0" cy="0" r="14" fill="#3b82f6"/>
    <text x="0" y="5" text-anchor="middle" fill="white" font-family="sans-serif" font-size="12" font-weight="bold">1</text>
    <line x1="14" y1="0" x2="136" y2="0" stroke="#3b82f6" stroke-width="2"/>
    <circle cx="150" cy="0" r="14" fill="#3b82f6"/>
    <text x="150" y="5" text-anchor="middle" fill="white" font-family="sans-serif" font-size="12" font-weight="bold">2</text>
    <line x1="164" y1="0" x2="286" y2="0" stroke="#334155" stroke-width="2"/>
    <circle cx="300" cy="0" r="14" fill="#334155"/>
    <text x="300" y="5" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="12">3</text>
    <line x1="314" y1="0" x2="436" y2="0" stroke="#334155" stroke-width="2"/>
    <circle cx="450" cy="0" r="14" fill="#334155"/>
    <text x="450" y="5" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="12">4</text>
    <line x1="464" y1="0" x2="586" y2="0" stroke="#334155" stroke-width="2"/>
    <circle cx="600" cy="0" r="14" fill="#334155"/>
    <text x="600" y="5" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="12">5</text>
  </g>
  <g transform="translate(100, 105)">
    <text x="0" y="0" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="10">欢迎</text>
    <text x="150" y="0" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="10">API 密钥</text>
    <text x="300" y="0" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="10">通道</text>
    <text x="450" y="0" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="10">技能</text>
    <text x="600" y="0" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="10">完成</text>
  </g>
  
  <!-- Main content area -->
  <text x="400" y="170" text-anchor="middle" fill="white" font-family="sans-serif" font-size="24" font-weight="bold">🔑 配置 API 密钥</text>
  <text x="400" y="200" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="14">至少配置一个模型 Provider 来驱动你的 AI 助手</text>
  
  <!-- Input fields -->
  <rect x="150" y="230" width="500" height="44" rx="8" fill="#1e293b" stroke="#334155"/>
  <text x="170" y="257" fill="#64748b" font-family="monospace" font-size="13">DeepSeek API Key</text>
  <text x="570" y="257" fill="#22c55e" font-family="sans-serif" font-size="12">✓ Valid</text>
  
  <rect x="150" y="290" width="500" height="44" rx="8" fill="#1e293b" stroke="#334155"/>
  <text x="170" y="317" fill="#64748b" font-family="monospace" font-size="13">百炼 (Bailian) API Key</text>
  <text x="560" y="317" fill="#64748b" font-family="sans-serif" font-size="11">Optional</text>
  
  <rect x="150" y="350" width="500" height="44" rx="8" fill="#1e293b" stroke="#334155"/>
  <text x="170" y="377" fill="#64748b" font-family="monospace" font-size="13">飞书 App ID / Secret</text>
  <text x="560" y="377" fill="#64748b" font-family="sans-serif" font-size="11">Optional</text>
  
  <!-- Buttons -->
  <rect x="480" y="420" width="170" height="42" rx="10" fill="url(#accent)"/>
  <text x="565" y="446" text-anchor="middle" fill="white" font-family="sans-serif" font-size="14" font-weight="bold">下一步 →</text>
  
  <rect x="310" y="420" width="150" height="42" rx="10" fill="transparent" stroke="#334155"/>
  <text x="385" y="446" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="14">← 上一步</text>
  
  <!-- Bottom branding -->
  <text x="400" y="486" text-anchor="middle" fill="#475569" font-family="sans-serif" font-size="11">🐾 xyvaClaw Setup Wizard v1.0 — Powered by OpenClaw</text>
</svg>
